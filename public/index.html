<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章总结生成器</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #0a0a0a;
            color: #f0f0f0;
            min-height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 280px 380px 1fr;
            gap: 0;
            min-height: 100vh;
        }

        /* ========== 历史记录侧边栏 ========== */
        .history-panel {
            background: #111;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease, opacity 0.3s ease;
            overflow: hidden;
        }

        .history-panel.collapsed {
            width: 0;
            border-right: none;
            opacity: 0;
        }

        .history-header {
            padding: 20px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-header h2 {
            font-size: 15px;
            font-weight: 600;
            color: #888;
        }

        .history-toggle {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .history-toggle:hover {
            color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        /* 展开/收起按钮（主界面） */
        .toggle-history-btn {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 60px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-left: none;
            border-radius: 0 8px 8px 0;
            color: #666;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.2s;
            z-index: 100;
        }

        .toggle-history-btn:hover {
            background: #222;
            color: #e94560;
        }

        .toggle-history-btn.visible {
            display: flex;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .history-item {
            padding: 14px;
            background: #1a1a1a;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .history-item:hover {
            border-color: #333;
            transform: translateX(2px);
        }

        .history-item.active {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.05);
        }

        .history-item .title {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 6px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .history-item .meta {
            font-size: 12px;
            color: #555;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item .delete-btn {
            opacity: 0;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
            padding: 2px;
        }

        .history-item:hover .delete-btn {
            opacity: 1;
        }

        .history-item .delete-btn:hover {
            color: #e94560;
        }

        .history-empty {
            text-align: center;
            padding: 40px 20px;
            color: #444;
        }

        .history-empty .icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        /* ========== 输入面板 ========== */
        .input-panel {
            background: #0d0d0d;
            border-right: 1px solid #222;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }

        .panel-title .icon {
            font-size: 22px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group textarea {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #f0f0f0;
            font-size: 14px;
            min-height: 180px;
            resize: vertical;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group textarea:focus {
            outline: none;
            border-color: #e94560;
        }

        .form-group input[type="url"] {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #f0f0f0;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e94560;
        }

        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            color: #666;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
            transition: all 0.2s;
        }

        .tab.active {
            background: #e94560;
            border-color: #e94560;
            color: white;
        }

        .tab:hover:not(.active) {
            border-color: #444;
            color: #aaa;
        }

        .input-area {
            display: none;
        }

        .input-area.active {
            display: block;
        }

        .file-upload {
            border: 2px dashed #2a2a2a;
            border-radius: 8px;
            padding: 36px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-upload:hover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.03);
        }

        .file-upload.dragover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.08);
        }

        .file-upload .icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .file-upload .text {
            color: #666;
            font-size: 13px;
        }

        .file-upload .hint {
            color: #444;
            font-size: 11px;
            margin-top: 6px;
        }

        .file-name {
            margin-top: 10px;
            padding: 10px 12px;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 6px;
            font-size: 12px;
            color: #e94560;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: #e94560;
            color: white;
            margin-top: auto;
        }

        .btn-primary:hover {
            background: #ff5a75;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background: #333;
            color: #555;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #2a2a2a;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #222;
            color: #aaa;
        }

        /* ========== 预览区 ========== */
        .preview-panel {
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            overflow: hidden;
        }

        .preview-header {
            padding: 16px 24px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0d0d0d;
        }

        .preview-title {
            font-size: 13px;
            color: #555;
            font-weight: 500;
        }

        .preview-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 8px 14px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #222;
            color: #aaa;
        }

        .action-btn.primary {
            background: #e94560;
            border-color: #e94560;
            color: white;
        }

        .action-btn.primary:hover {
            background: #ff5a75;
        }

        .preview-container {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px;
        }

        .placeholder {
            text-align: center;
            color: #333;
            margin-top: 100px;
        }

        .placeholder .icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .placeholder p {
            font-size: 14px;
        }

        .placeholder .hint {
            font-size: 12px;
            color: #444;
            margin-top: 8px;
        }

        /* ========== 卡片样式 ========== */
        .card {
            background: #141414;
            border-radius: 16px;
            padding: 44px 40px;
            border: 1px solid #222;
            max-width: 680px;
            width: 100%;
        }

        .header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #222;
        }

        .header .tag-line {
            font-size: 11px;
            color: #e94560;
            margin-bottom: 14px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            line-height: 1.35;
            margin-bottom: 14px;
        }

        .header h1 em {
            color: #e94560;
            font-style: normal;
        }

        .header .author {
            font-size: 14px;
            color: #666;
        }

        .header .author span {
            color: #e94560;
            font-weight: 500;
        }

        .qa-item {
            margin-bottom: 28px;
        }

        .qa-item .question {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 14px;
        }

        .qa-item .q-number {
            flex-shrink: 0;
            color: #e94560;
            font-weight: 700;
            font-size: 15px;
            min-width: 22px;
        }

        .qa-item .q-text {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            line-height: 1.5;
        }

        .qa-item .answer {
            padding-left: 34px;
            line-height: 1.85;
            font-size: 14px;
            color: #999;
        }

        .qa-item .answer strong {
            color: #e94560;
            font-weight: 600;
        }

        .qa-item .answer em {
            color: #ff6b6b;
            font-style: normal;
            font-weight: 500;
        }

        .logic-chain {
            margin-top: 14px;
            padding: 14px 18px;
            background: rgba(233, 69, 96, 0.08);
            border-left: 3px solid #e94560;
            border-radius: 0 8px 8px 0;
            font-size: 13px;
        }

        .logic-chain .arrow {
            color: #e94560;
            margin: 0 8px;
        }

        .data-box {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 14px;
        }

        .data-box .box {
            padding: 16px 12px;
            background: rgba(233, 69, 96, 0.08);
            border: 1px solid rgba(233, 69, 96, 0.15);
            border-radius: 8px;
            text-align: center;
        }

        .data-box .box .num {
            font-size: 24px;
            font-weight: 700;
            color: #e94560;
        }

        .data-box .box .label {
            font-size: 11px;
            color: #666;
            margin-top: 6px;
        }

        .compare-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 14px;
        }

        .compare-box .box {
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 13px;
        }

        .compare-box .box.old {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #333;
            color: #666;
        }

        .compare-box .box.new {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.2);
            color: #e0e0e0;
        }

        .compare-box .box .label {
            font-size: 11px;
            color: #555;
            margin-bottom: 8px;
        }

        .compare-box .box.new .label {
            color: #e94560;
        }

        .footer {
            margin-top: 36px;
            padding-top: 24px;
            border-top: 1px solid #222;
        }

        .keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
        }

        .keywords .tag {
            padding: 6px 14px;
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.2);
            border-radius: 20px;
            font-size: 12px;
            color: #e94560;
        }

        .source {
            font-size: 12px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ========== Loading ========== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-content {
            text-align: center;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #222;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #888;
            font-size: 14px;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 240px 340px 1fr;
            }
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }

            .history-panel {
                display: none;
            }

            .input-panel {
                border-right: none;
                border-bottom: 1px solid #222;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 展开历史记录按钮 -->
        <button class="toggle-history-btn" id="toggleHistoryBtn" onclick="toggleHistory()" title="展开历史记录">▶</button>

        <!-- 历史记录侧边栏 -->
        <div class="history-panel" id="historyPanel">
            <div class="history-header">
                <h2>历史记录</h2>
                <button class="history-toggle" onclick="toggleHistory()" title="收起">◀</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty">
                    <div class="icon">📝</div>
                    <p>暂无记录</p>
                </div>
            </div>
        </div>

        <!-- 输入面板 -->
        <div class="input-panel">
            <h1 class="panel-title">
                <span class="icon">📄</span>
                文章总结
            </h1>

            <!-- 输入方式选择 -->
            <div class="tabs">
                <div class="tab active" data-tab="text">粘贴文本</div>
                <div class="tab" data-tab="url">URL链接</div>
                <div class="tab" data-tab="file">上传PDF</div>
            </div>

            <!-- 文本输入 -->
            <div class="input-area active" id="text-area">
                <div class="form-group">
                    <label>文章内容</label>
                    <textarea id="articleText" placeholder="粘贴文章内容..."></textarea>
                </div>
            </div>

            <!-- URL输入 -->
            <div class="input-area" id="url-area">
                <div class="form-group">
                    <label>文章URL</label>
                    <input type="url" id="articleUrl" placeholder="https://...">
                </div>
            </div>

            <!-- 文件上传 -->
            <div class="input-area" id="file-area">
                <div class="file-upload" id="fileUpload">
                    <div class="icon">📁</div>
                    <div class="text">点击或拖拽上传PDF</div>
                    <div class="hint">最大 10MB</div>
                </div>
                <input type="file" id="fileInput" accept=".pdf" style="display: none;">
                <div class="file-name" id="fileName" style="display: none;"></div>
            </div>

            <button class="btn btn-secondary" id="exampleBtn">
                <span>📝</span> 加载示例
            </button>

            <button class="btn btn-primary" id="generateBtn">
                <span>✨</span> 生成总结
            </button>
        </div>

        <!-- 预览区 -->
        <div class="preview-panel">
            <div class="preview-header">
                <span class="preview-title">预览</span>
                <div class="preview-actions" id="previewActions" style="display: none;">
                    <button class="action-btn" onclick="printCard()">🖨️ 打印</button>
                    <button class="action-btn primary" onclick="saveAsImage()">📷 保存图片</button>
                </div>
            </div>

            <div class="preview-container">
                <div class="placeholder" id="placeholder">
                    <div class="icon">📝</div>
                    <p>输入文章内容，点击生成总结</p>
                    <p class="hint">支持文本、URL、PDF三种方式</p>
                </div>

                <div class="card" id="summaryCard" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在分析文章，请稍候...</div>
        </div>
    </div>

    <script>
        let currentHistoryId = null;

        // 收起/展开历史记录
        function toggleHistory() {
            const panel = document.getElementById('historyPanel');
            const btn = document.getElementById('toggleHistoryBtn');
            const toggleIcon = panel.querySelector('.history-toggle');

            if (panel.classList.contains('collapsed')) {
                panel.classList.remove('collapsed');
                btn.classList.remove('visible');
                toggleIcon.textContent = '◀';
                toggleIcon.title = '收起';
            } else {
                panel.classList.add('collapsed');
                btn.classList.add('visible');
                toggleIcon.textContent = '▶';
                toggleIcon.title = '展开';
            }
        }

        // 加载历史记录
        async function loadHistory() {
            try {
                const res = await fetch('/api/history');
                const result = await res.json();
                if (result.success) {
                    renderHistory(result.data);
                }
            } catch (error) {
                console.error('加载历史记录失败:', error);
            }
        }

        // 渲染历史记录
        function renderHistory(history) {
            const list = document.getElementById('historyList');

            if (!history.length) {
                list.innerHTML = `
                    <div class="history-empty">
                        <div class="icon">📝</div>
                        <p>暂无记录</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = history.map(item => `
                <div class="history-item ${item.id === currentHistoryId ? 'active' : ''}" data-id="${item.id}">
                    <div class="title">${item.title}</div>
                    <div class="meta">
                        <span>${formatDate(item.createdAt)}</span>
                        <button class="delete-btn" onclick="deleteHistory(event, '${item.id}')">✕</button>
                    </div>
                </div>
            `).join('');

            // 绑定点击事件
            list.querySelectorAll('.history-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('delete-btn')) {
                        loadHistoryItem(el.dataset.id);
                    }
                });
            });
        }

        // 加载历史记录项
        function loadHistoryItem(id) {
            fetch('/api/history')
                .then(res => res.json())
                .then(result => {
                    if (result.success) {
                        const item = result.data.find(h => h.id === id);
                        if (item) {
                            currentHistoryId = id;
                            renderCard(item.data);
                            document.getElementById('placeholder').style.display = 'none';
                            document.getElementById('summaryCard').style.display = 'block';
                            document.getElementById('previewActions').style.display = 'flex';
                            renderHistory(result.data);
                        }
                    }
                });
        }

        // 删除历史记录
        async function deleteHistory(event, id) {
            event.stopPropagation();
            if (!confirm('确定删除这条记录？')) return;

            try {
                await fetch(`/api/history/${id}`, { method: 'DELETE' });
                if (currentHistoryId === id) {
                    currentHistoryId = null;
                    document.getElementById('placeholder').style.display = 'block';
                    document.getElementById('summaryCard').style.display = 'none';
                    document.getElementById('previewActions').style.display = 'none';
                }
                loadHistory();
            } catch (error) {
                console.error('删除失败:', error);
            }
        }

        // 格式化日期
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';

            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }

        // Tab切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.input-area').forEach(a => a.classList.remove('active'));

                tab.classList.add('active');
                const area = document.getElementById(tab.dataset.tab + '-area');
                if (area) area.classList.add('active');
            });
        });

        // 文件上传
        const fileUpload = document.getElementById('fileUpload');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');

        fileUpload.addEventListener('click', () => fileInput.click());

        fileUpload.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileUpload.classList.add('dragover');
        });

        fileUpload.addEventListener('dragleave', () => {
            fileUpload.classList.remove('dragover');
        });

        fileUpload.addEventListener('drop', (e) => {
            e.preventDefault();
            fileUpload.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                updateFileName(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                updateFileName(fileInput.files[0]);
            }
        });

        function updateFileName(file) {
            fileName.textContent = '已选择: ' + file.name;
            fileName.style.display = 'block';
        }

        // 生成总结
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const activeTab = document.querySelector('.tab.active').dataset.tab;
            let endpoint, body;

            if (activeTab === 'text') {
                const content = document.getElementById('articleText').value.trim();
                if (!content) {
                    alert('请输入文章内容');
                    return;
                }
                endpoint = '/api/analyze';
                body = { content };
            } else if (activeTab === 'url') {
                const url = document.getElementById('articleUrl').value.trim();
                if (!url) {
                    alert('请输入文章URL');
                    return;
                }
                endpoint = '/api/fetch';
                body = { url };
            } else if (activeTab === 'file') {
                if (!fileInput.files.length) {
                    alert('请上传PDF文件');
                    return;
                }
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);

                showLoading(true);
                try {
                    const response = await fetch('/api/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await response.json();
                    handleResult(result);
                } catch (error) {
                    alert('请求失败: ' + error.message);
                } finally {
                    showLoading(false);
                }
                return;
            }

            showLoading(true);
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const result = await response.json();
                handleResult(result);
            } catch (error) {
                alert('请求失败: ' + error.message);
            } finally {
                showLoading(false);
            }
        });

        // 加载示例
        document.getElementById('exampleBtn').addEventListener('click', () => {
            document.getElementById('articleText').value = `美伊冲突第十六天：封锁无解，6-7月炼厂巨亏成定局

3月14日，美伊冲突进入第十六天。高盛最新追踪报告显示，霍尔木兹海峡的石油流量已从正常水平的每日逾1900万桶骤降至约60万桶，降幅高达97%。

IEA确认史上最大规模供应中断。国际能源署指出，霍尔木兹海峡的原油和成品油流量已从战前的约2000万桶/日暴跌90%以上，迫使海湾产油国减产至少1000万桶/日。

双方拒绝和谈，封锁长期化。特朗普政府已拒绝中东盟友提出的和谈建议。伊朗方面同样强硬，革命卫队明确表示不会接受任何停火谈判。

根据IEA最新报告，中东地区出口预计6-7月才能恢复正常。这意味着整个二季度，供应紧张都是铁定的。

炼厂方面，战前73美元低价库存可维持一个半月，4月下旬后库存耗尽，将面临单桶40美元的深度亏损。4月炼厂亏损25亿是铁定的，5月再亏25亿，6月亏23.7亿。

采购策略方面，俄油从折价13美元变成溢价5美元，西非原油成为性价比之王。`;
        });

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('active', show);
        }

        function handleResult(result) {
            if (result.success) {
                currentHistoryId = result.historyId;
                renderCard(result.data);
                document.getElementById('placeholder').style.display = 'none';
                document.getElementById('summaryCard').style.display = 'block';
                document.getElementById('previewActions').style.display = 'flex';
                loadHistory();
            } else {
                const errorMsg = result.error || result.message || '未知错误';
                const detailMsg = result.details ? '\n\n详细信息: ' + result.details : '';
                alert('分析失败: ' + errorMsg + detailMsg);
            }
        }

        function renderCard(data) {
            const card = document.getElementById('summaryCard');

            let questionsHtml = data.questions.map((q, i) => `
                <div class="qa-item">
                    <div class="question">
                        <span class="q-number">${i + 1}.</span>
                        <span class="q-text">${q.question}</span>
                    </div>
                    <div class="answer">${formatAnswer(q.answer, q.type)}</div>
                </div>
            `).join('');

            let keywordsHtml = data.keywords.map(k => `<span class="tag">#${k}</span>`).join('');

            card.innerHTML = `
                <div class="header">
                    <div class="tag-line">${data.tagLine || '文章总结'}</div>
                    <h1>${data.title}</h1>
                    <p class="author">${data.subtitle || ''}</p>
                </div>
                ${questionsHtml}
                <div class="footer">
                    <div class="keywords">${keywordsHtml}</div>
                    <div class="source">📖 ${data.source || '来源未知'}</div>
                </div>
            `;
        }

        function formatAnswer(answer, type) {
            let formatted = answer
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>');
            formatted = formatted.replace(/→/g, '<span class="arrow">→</span>');
            return formatted;
        }

        async function saveAsImage() {
            const card = document.getElementById('summaryCard');
            const actions = document.getElementById('previewActions');

            try {
                actions.style.display = 'none';

                const canvas = await html2canvas(card, {
                    scale: 2,
                    backgroundColor: '#141414',
                    useCORS: true
                });

                const link = document.createElement('a');
                link.download = `文章总结_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();

            } catch (error) {
                alert('生成图片失败: ' + error.message);
            } finally {
                actions.style.display = 'flex';
            }
        }

        function printCard() {
            window.print();
        }

        // 初始化
        loadHistory();
    </script>
</body>
</html>
